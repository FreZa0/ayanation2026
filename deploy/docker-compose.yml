services:
  mongodb:
    image: mongo:latest
    container_name: ayanation-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ayanation
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ayanation-network

volumes:
  mongodb_data:

networks:
  ayanation-network:
    driver: bridge
